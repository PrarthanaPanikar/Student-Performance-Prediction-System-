name: CI/CD Pipeline for Student Performance Prediction

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run drift detection daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run data generation
      run: |
        python data/generate_synthetic_data.py
    
    - name: Run ML pipeline tests
      run: |
        pytest tests/test_ml_pipeline.py -v --cov=src --cov-report=xml
    
    - name: Run API tests
      run: |
        pytest tests/test_api.py -v --cov=serving --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
    
    - name: Install dependencies
      working-directory: ./apps/web
      run: npm ci
    
    - name: Run linting
      working-directory: ./apps/web
      run: npm run lint
    
    - name: Build frontend
      working-directory: ./apps/web
      run: npm run build
    
    - name: Run tests
      working-directory: ./apps/web
      run: npm test -- --coverage --watchAll=false

  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Node.js dependencies
      working-directory: ./apps/web
      run: npm ci
    
    - name: Generate data and train model
      run: |
        python data/generate_synthetic_data.py
        python notebooks/01_ingest.py
        python src/train_baselines.py
        python src/tune_optuna.py
    
    - name: Start API server
      run: |
        python serving/app.py &
        sleep 10
    
    - name: Run integration tests
      run: |
        curl -f http://localhost:8000/health
        curl -X POST http://localhost:8000/predict \
          -H "Content-Type: application/json" \
          -d '{"prior_gpa": 3.0, "attendance_pct": 85, "study_hours_wk": 12, "commute_min": 30, "quiz_avg": 75, "assign_avg": 78, "midterm": 72, "on_time_submit_pct": 90, "lms_logins_wk": 4, "forum_posts": 2, "gender": "M", "school_type": "Public", "parent_edu": "Bachelor"}'

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend, integration-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.api
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/student-performance-api:latest
          ${{ secrets.DOCKER_USERNAME }}/student-performance-api:${{ github.sha }}
    
    - name: Build and push Web image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.web
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/student-performance-web:latest
          ${{ secrets.DOCKER_USERNAME }}/student-performance-web:${{ github.sha }}

  drift-detection:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run drift detection
      run: |
        python scripts/monitor_drift.py --simulate
    
    - name: Upload drift report
      uses: actions/upload-artifact@v3
      with:
        name: drift-report
        path: outputs/
    
    - name: Create issue if drift detected
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Data Drift Detected',
            body: 'Automated drift detection has identified significant data drift. Please review the drift report and consider retraining the model.',
            labels: ['drift', 'urgent']
          })

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # For example, update Kubernetes deployment or run docker-compose

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker, drift-detection]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # For example, update Kubernetes deployment or run docker-compose
    
    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # Add smoke test commands here

  performance-tests:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust
    
    - name: Run performance tests
      run: |
        # Add performance test script here
        echo "Running performance tests..."
        # locust -f performance_test.py --headless --users 100 --spawn-rate 10 --run-time 60s --host http://staging-url

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.deploy-production.result == 'success'
      run: |
        echo "✅ Deployment successful!"
        # Add Slack/Teams notification here
    
    - name: Notify on failure
      if: needs.deploy-production.result == 'failure'
      run: |
        echo "❌ Deployment failed!"
        # Add Slack/Teams notification here
